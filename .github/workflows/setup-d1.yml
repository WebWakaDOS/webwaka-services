name: Setup D1 Databases (one-time)

on:
  workflow_dispatch:

jobs:
  create-d1:
    name: Create D1 Databases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create D1 Databases
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Listing existing D1 databases ==="
          npx wrangler d1 list 2>&1

          echo ""
          echo "=== Creating webwaka-services-db-prod ==="
          npx wrangler d1 create webwaka-services-db-prod 2>&1 || echo "(already exists or error — check list above)"

          echo ""
          echo "=== Creating webwaka-services-db-staging ==="
          npx wrangler d1 create webwaka-services-db-staging 2>&1 || echo "(already exists or error — check list above)"

          echo ""
          echo "=== IMPORTANT ==="
          echo "Copy the database_id UUIDs above, then add them as GitHub secrets:"
          echo "  CF_D1_PROD_DB_ID    — UUID of webwaka-services-db-prod"
          echo "  CF_D1_STAGING_DB_ID — UUID of webwaka-services-db-staging"
          echo "Settings → Secrets and variables → Actions → New repository secret"
