name: Deploy WebWaka Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Enforce zero console.log in production code
        run: |
          if grep -r "console\.log" src/ --include="*.ts" --exclude="*.test.ts"; then
            echo "ERROR: console.log found in production code."
            exit 1
          fi
          echo "✅ No console.log in production code"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject D1 Staging Database ID
        env:
          CF_D1_STAGING_DB_ID: ${{ secrets.CF_D1_STAGING_DB_ID }}
        run: |
          if [ -z "$CF_D1_STAGING_DB_ID" ]; then
            echo "ERROR: Secret CF_D1_STAGING_DB_ID is not set."
            echo "Run: wrangler d1 create webwaka-services-db-staging"
            echo "Then add the UUID as a GitHub secret: CF_D1_STAGING_DB_ID"
            exit 1
          fi
          sed -i "s/REPLACE_WITH_SERVICES_STAGING_DB_ID/$CF_D1_STAGING_DB_ID/g" wrangler.toml
          echo "✅ Staging D1 ID injected"

      - name: Deploy to Cloudflare Workers (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Apply D1 Migrations (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_D1_STAGING_DB_ID: ${{ secrets.CF_D1_STAGING_DB_ID }}
        run: |
          sed -i "s/REPLACE_WITH_SERVICES_STAGING_DB_ID/$CF_D1_STAGING_DB_ID/g" wrangler.toml
          npx wrangler d1 migrations apply webwaka-services-db-staging --env staging --remote
          echo "✅ Staging migrations applied"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://webwaka-services-production.webwaka.workers.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject D1 Production Database ID
        env:
          CF_D1_PROD_DB_ID: ${{ secrets.CF_D1_PROD_DB_ID }}
        run: |
          if [ -z "$CF_D1_PROD_DB_ID" ]; then
            echo "ERROR: Secret CF_D1_PROD_DB_ID is not set."
            echo "Run: wrangler d1 create webwaka-services-db-prod"
            echo "Then add the UUID as a GitHub secret: CF_D1_PROD_DB_ID"
            exit 1
          fi
          sed -i "s/REPLACE_WITH_SERVICES_PROD_DB_ID/$CF_D1_PROD_DB_ID/g" wrangler.toml
          echo "✅ Production D1 ID injected"

      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Apply D1 Migrations (Production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_D1_PROD_DB_ID: ${{ secrets.CF_D1_PROD_DB_ID }}
        run: |
          sed -i "s/REPLACE_WITH_SERVICES_PROD_DB_ID/$CF_D1_PROD_DB_ID/g" wrangler.toml
          npx wrangler d1 migrations apply webwaka-services-db-prod --env production --remote
          echo "✅ Production migrations applied"

      - name: Verify API health
        run: |
          sleep 15
          curl -sf https://webwaka-services-production.webwaka.workers.dev/health \
            -o /tmp/health.json || echo "Health check endpoint pending..."
          cat /tmp/health.json || true
