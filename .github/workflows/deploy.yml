name: Deploy WebWaka Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Enforce zero console.log in production code
        run: |
          if grep -r "console\.log" src/ --include="*.ts" --exclude="*.test.ts"; then
            echo "ERROR: console.log found in production code. Use structured logging instead."
            exit 1
          fi
          echo "✅ No console.log in production code"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap D1 Database (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          DB_NAME="webwaka-services-db-staging"
          echo "Checking for D1 database: $DB_NAME"

          # List existing D1 databases and extract ID if it exists
          DB_LIST=$(npx wrangler d1 list --json 2>/dev/null || echo "[]")
          DB_ID=$(echo "$DB_LIST" | python3 -c "
          import json, sys
          dbs = json.load(sys.stdin)
          for db in dbs:
              if db.get('name') == '${DB_NAME}':
                  print(db.get('uuid', db.get('id', '')))
                  break
          " 2>/dev/null || echo "")

          if [ -z "$DB_ID" ]; then
            echo "Database not found — creating $DB_NAME"
            CREATE_OUT=$(npx wrangler d1 create "$DB_NAME" --json 2>/dev/null || npx wrangler d1 create "$DB_NAME" 2>&1)
            DB_ID=$(echo "$CREATE_OUT" | python3 -c "
          import json, sys, re
          raw = sys.stdin.read()
          try:
              data = json.loads(raw)
              print(data.get('uuid', data.get('id', '')))
          except:
              m = re.search(r'database_id\s*=\s*[\"'\'']?([0-9a-f-]{36})', raw)
              if m: print(m.group(1))
          " 2>/dev/null || echo "")
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not retrieve or create D1 database $DB_NAME"
            exit 1
          fi

          echo "Using D1 database ID: $DB_ID"

          # Patch wrangler.toml with the real database ID
          sed -i "s/REPLACE_WITH_SERVICES_STAGING_DB_ID/$DB_ID/g" wrangler.toml
          echo "✅ wrangler.toml patched with staging D1 ID: $DB_ID"

      - name: Deploy to Cloudflare Workers (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Apply D1 Migrations (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations to staging..."
          npx wrangler d1 migrations apply webwaka-services-db-staging --env staging --remote || true
          echo "✅ Migrations applied"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://webwaka-services-production.webwaka.workers.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap D1 Database (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          DB_NAME="webwaka-services-db-prod"
          echo "Checking for D1 database: $DB_NAME"

          # List existing D1 databases and extract ID if it exists
          DB_LIST=$(npx wrangler d1 list --json 2>/dev/null || echo "[]")
          DB_ID=$(echo "$DB_LIST" | python3 -c "
          import json, sys
          dbs = json.load(sys.stdin)
          for db in dbs:
              if db.get('name') == '${DB_NAME}':
                  print(db.get('uuid', db.get('id', '')))
                  break
          " 2>/dev/null || echo "")

          if [ -z "$DB_ID" ]; then
            echo "Database not found — creating $DB_NAME"
            CREATE_OUT=$(npx wrangler d1 create "$DB_NAME" --json 2>/dev/null || npx wrangler d1 create "$DB_NAME" 2>&1)
            DB_ID=$(echo "$CREATE_OUT" | python3 -c "
          import json, sys, re
          raw = sys.stdin.read()
          try:
              data = json.loads(raw)
              print(data.get('uuid', data.get('id', '')))
          except:
              m = re.search(r'database_id\s*=\s*[\"'\'']?([0-9a-f-]{36})', raw)
              if m: print(m.group(1))
          " 2>/dev/null || echo "")
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not retrieve or create D1 database $DB_NAME"
            exit 1
          fi

          echo "Using D1 database ID: $DB_ID"

          # Patch wrangler.toml with the real database ID
          sed -i "s/REPLACE_WITH_SERVICES_PROD_DB_ID/$DB_ID/g" wrangler.toml
          echo "✅ wrangler.toml patched with production D1 ID: $DB_ID"

      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Apply D1 Migrations (Production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations to production..."
          npx wrangler d1 migrations apply webwaka-services-db-prod --env production --remote || true
          echo "✅ Migrations applied"

      - name: Verify API health
        run: |
          sleep 20
          curl -sf https://webwaka-services-production.webwaka.workers.dev/health \
            -o /tmp/health.json || echo "Health check pending..."
          cat /tmp/health.json || true
