name = "webwaka-institutional"
main = "src/worker.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-institutional-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-institutional-db-staging"
database_id = "NEEDS_D1_UPGRADE"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "87b659542f924ee89b332d4c4cdd1de9"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "66409835080f4d0989b0767b98d5dff8"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-institutional-media-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-institutional-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-institutional-db-production"
database_id = "NEEDS_D1_UPGRADE"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "eae7ae4014a142678bd60fc0c93bb41f"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7f71de40bb3c4f419f617022d18da45f"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-institutional-media-production"

[env.production.vars]
ENVIRONMENT = "production"

# ─── Secrets (set via: wrangler secret put <KEY> --env <staging|production>) ──
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# OPENROUTER_API_KEY
# TERMII_API_KEY
