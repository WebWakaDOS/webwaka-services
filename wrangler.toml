name = "webwaka-services"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Migrations ────────────────────────────────────────────────────────────
# wrangler d1 migrations apply <database_name> --env <staging|production> --remote
[[migrations]]
tag = "v0001"
new_sql_file = "migrations/0001_initial_schema.sql"

[[migrations]]
tag = "v0002"
new_sql_file = "migrations/0002_appointments_whatsapp.sql"

[[migrations]]
tag = "v0003"
new_sql_file = "migrations/0003_staff_scheduling_quotes_deposits_reminders.sql"

[[migrations]]
tag = "v0004"
new_sql_file = "migrations/0004_extensions.sql"

[[migrations]]
tag = "v0005"
new_sql_file = "migrations/0005_fix_invoices_projectid_nullable.sql"

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-services-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-services-db-staging"
database_id = "REPLACE_WITH_SERVICES_STAGING_DB_ID"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "87b659542f924ee89b332d4c4cdd1de9"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "66409835080f4d0989b0767b98d5dff8"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-services-docs-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-services-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-services-db-prod"
database_id = "REPLACE_WITH_SERVICES_PROD_DB_ID"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "eae7ae4014a142678bd60fc0c93bb41f"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7f71de40bb3c4f419f617022d18da45f"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-services-docs-prod"

[env.production.vars]
ENVIRONMENT = "production"

# ─── Secrets (set via: wrangler secret put <KEY> --env <staging|production>) ──
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# OPENROUTER_API_KEY
# TERMII_API_KEY
# WHATSAPP_VERIFY_TOKEN        — shared secret for Meta/Termii hub.challenge verification
# TERMII_WHATSAPP_SENDER_ID    — optional: Termii sender ID for WhatsApp Business channel
# AI_PLATFORM_URL              — URL of the webwaka-ai-platform worker
# INTER_SERVICE_SECRET         — inter-service auth secret for webwaka-ai-platform calls
# CENTRAL_MGMT_URL             — URL of webwaka-central-mgmt for financial ledger events
